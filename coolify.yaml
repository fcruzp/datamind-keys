# =============================================================================
# DataMind BI — API Keys Manager
# coolify.yaml — Configuración de despliegue para Coolify
# =============================================================================
#
# Este archivo es la fuente de verdad para desplegar datamind-api.mooo.com.
# Coolify lo lee automáticamente si está en la raíz del repo, o puedes
# pegar el bloque `labels` en el campo "Custom Labels" del dashboard.
#
# Dominio:  datamind-api.mooo.com
# Puerto:   3000 (Next.js standalone)
# Repo:     fcruzp/datamind-keys
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# 1. Labels de proxy (Traefik + Caddy)
#    Equivalente exacto al de datamind.mooo.com pero con el dominio nuevo.
#    Pega estas líneas en: Coolify → Service → Configuration → Custom Labels
# ─────────────────────────────────────────────────────────────────────────────
labels:
  # Traefik: habilitar + middlewares globales
  - "traefik.enable=true"
  - "traefik.http.middlewares.gzip.compress=true"
  - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  # Traefik: router HTTP (puerto 80) → redirige a HTTPS
  - "traefik.http.routers.http-0-datamindapi.entryPoints=http"
  - "traefik.http.routers.http-0-datamindapi.middlewares=redirect-to-https"
  - "traefik.http.routers.http-0-datamindapi.rule=Host(`datamind-api.mooo.com`) && PathPrefix(`/`)"
  - "traefik.http.routers.http-0-datamindapi.service=http-0-datamindapi"

  # Traefik: router HTTPS (puerto 443) con gzip + certificado Let's Encrypt
  - "traefik.http.routers.https-0-datamindapi.entryPoints=https"
  - "traefik.http.routers.https-0-datamindapi.middlewares=gzip"
  - "traefik.http.routers.https-0-datamindapi.rule=Host(`datamind-api.mooo.com`) && PathPrefix(`/`)"
  - "traefik.http.routers.https-0-datamindapi.service=https-0-datamindapi"
  - "traefik.http.routers.https-0-datamindapi.tls.certresolver=letsencrypt"
  - "traefik.http.routers.https-0-datamindapi.tls=true"

  # Traefik: backend apunta al puerto 3000 del contenedor
  - "traefik.http.services.http-0-datamindapi.loadbalancer.server.port=3000"
  - "traefik.http.services.https-0-datamindapi.loadbalancer.server.port=3000"

  # Caddy (proxy alternativo que usa Coolify)
  - "caddy_0.encode=zstd gzip"
  - "caddy_0.handle_path.0_reverse_proxy={{upstreams 3000}}"
  - "caddy_0.handle_path=/*"
  - "caddy_0.header=-Server"
  - "caddy_0.try_files={path} /index.html /index.php"
  - "caddy_0=https://datamind-api.mooo.com"
  - "caddy_ingress_network=coolify"

# ─────────────────────────────────────────────────────────────────────────────
# 2. Variables de entorno (configúralas en el dashboard de Coolify)
#    Coolify → Service → Environment Variables
# ─────────────────────────────────────────────────────────────────────────────
environment:
  # Runtime
  NODE_ENV: production
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"

  # ── Supabase (mismo proyecto que BIweb: rsrcdaepiwjqfynwwzcn) ──
  NEXT_PUBLIC_SUPABASE_URL: "https://rsrcdaepiwjqfynwwzcn.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY: "<pegar anon key>"
  SUPABASE_SERVICE_ROLE_KEY: "<pegar service role key>"
  SUPABASE_PUBLISHABLE_KEY: "sb_publishable_gB8AGof8Nd4UkmblvOjr7g_2aG4KrCy"

  # ── Postgres (Supabase pooler) — OBLIGATORIO para Prisma ──
  # Transaction pooler (puerto 6543) para runtime
  DATABASE_URL: "postgresql://postgres.rsrcdaepiwjqfynwwzcn:[PASSWORD]@aws-0-[region].pooler.supabase.com:6543/postgres?pgbouncer=true"
  # Direct connection (puerto 5432) para migraciones
  DIRECT_URL: "postgresql://postgres.rsrcdaepiwjqfynwwzcn:[PASSWORD]@aws-0-[region].pooler.supabase.com:5432/postgres"

  # ── App ──
  NEXT_PUBLIC_SITE_URL: "https://datamind-api.mooo.com"

# ─────────────────────────────────────────────────────────────────────────────
# 3. Configuración del servicio
# ─────────────────────────────────────────────────────────────────────────────
service:
  name: datamind-keys
  domain: datamind-api.mooo.com
  port: 3000
  restart: unless-stopped
  healthcheck:
    test: "curl -fsS http://localhost:3000/api/health || exit 1"
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 30s

# ─────────────────────────────────────────────────────────────────────────────
# 4. Build
# ─────────────────────────────────────────────────────────────────────────────
build:
  dockerfile: Dockerfile
  context: .

# ─────────────────────────────────────────────────────────────────────────────
# 5. Red
# ─────────────────────────────────────────────────────────────────────────────
networks:
  coolify:
    external: true
